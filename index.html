<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>FMCG News & Prices | Egypt</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="متابعة أخبار FMCG وزيادات الأسعار في مصر – الذهب، الحديد، الأسمنت والشركات الكبرى" />

  <style>
    body {
      font-family: Arial, Tahoma, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #ffffff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      color: #1e40af;
    }

    a {
      color: #1e40af;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .loading {
      color: #666;
      font-size: 14px;
    }

    small {
      color: #555;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>🛒 FMCG News & Prices – Egypt</h1>
      <p style="margin:5px 0 0;">آخر أخبار السلع وزيادات الأسعار في مصر</p>
    </header>

    <div class="card" id="prices">
      <p class="loading">⏳ جاري تحميل الأسعار...</p>
    </div>

    <div class="card" id="news">
      <p class="loading">⏳ جاري تحميل أخبار FMCG...</p>
    </div>

    <footer>
      <p>الموقع تجريبي – بيانات مجانية من مصادر عامة</p>
    </footer>
  </div>

<script>
  // ⚠️ غيّر الرابط ده لرابط Railway بتاعك
  const API_URL = "https://YOUR-APP-NAME.up.railway.app/api/data";

  fetch(API_URL)
    .then(response => response.json())
    .then(data => {
      // ====== أسعار ======
      document.getElementById("prices").innerHTML = `
        <h2>📊 أسعار السلع</h2>
        <p>🥇 <strong>الذهب:</strong> ${data.prices.gold}</p>
        <p>🏗️ <strong>الحديد:</strong> ${data.prices.steel}</p>
        <p>🧱 <strong>الأسمنت:</strong> ${data.prices.cement}</p>
        <small>آخر تحديث: ${new Date(data.lastUpdate).toLocaleString()}</small>
      `;

      // ====== أخبار ======
      let newsHTML = "<h2>📰 أخبار FMCG</h2>";

      if (!data.news || data.news.length === 0) {
        newsHTML += "<p>لا توجد أخبار حالياً</p>";
      } else {
        data.news.forEach(item => {
          newsHTML += `
            <p>
              • ${item.link}${item.title}</a><br>
              <small>${item.source}</small>
            </p>
          `;
        });
      }

      document.getElementById("news").innerHTML = newsHTML;
    })
    .catch(err => {
      document.getElementById("prices").innerHTML =
        "<p>❌ حدث خطأ في تحميل البيانات</p>";
      document.getElementById("news").innerHTML =
        "<p>❌ تأكد من رابط Railway</p>";
      console.error(err);
    });
</script>

</body>
</html>
