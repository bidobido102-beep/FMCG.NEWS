<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>FMCG News Egypt</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  direction: rtl;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
}

.badge {
  background: #d32f2f;
  color: white;
  padding: 2px 6px;
  font-size: 12px;
  border-radius: 4px;
  margin-right: 5px;
}

a {
  color: #1e40af;
  text-decoration: none;
}

small {
  color: #555;
}
</style>
</head>

<body>

<h1>🛒 FMCG News Egypt</h1>

<!-- ===== Market Prices ===== -->
<div class="card">
  <h2>📊 اتجاهات الأسعار اليوم</h2>

  <p>🥇 <strong>الذهب:</strong> <span id="gold"></span></p>
  <p>🏗️ <strong>الحديد:</strong> <span id="steel"></span></p>
  <p>🧱 <strong>الأسمنت:</strong> <span id="cement"></span></p>

  <small id="priceDate"></small>
</div>

<!-- ===== Status ===== -->
<p id="status">⏳ جاري تحميل الأخبار...</p>

<!-- ===== News ===== -->
<div id="news"></div>

<script>
const API = "https://fmcg-api-production-5e80.up.railway.app/api/data";

fetch(API)
  .then(res => res.json())
  .then(data => {

    // ===== Prices =====
    document.getElementById("gold").innerText =
      data.prices.gold.trend + " – " + data.prices.gold.note;

    document.getElementById("steel").innerText =
      data.prices.steel.trend + " – " + data.prices.steel.note;

    document.getElementById("cement").innerText =
      data.prices.cement.trend + " – " + data.prices.cement.note;

    document.getElementById("priceDate").innerText =
      "آخر تحديث: " + data.prices.lastUpdate;

    // ===== News =====
    document.getElementById("status").innerText =
      "✅ آخر أخبار FMCG";

    let html = "";
    data.news.forEach(n => {
      html += `
        <div class="card">
          ${n.link}${n.title}</a>
          ${n.priceIncrease ? '<span class="badge">زيادة أسعار</span>' : ''}
          <br>
          <small>${n.source}</small>
        </div>`;
    });

    document.getElementById("news").innerHTML = html;
  })
  .catch(() => {
    document.getElementById("status").innerText =
      "❌ فشل تحميل الأخبار";
  });
</script>

</body>
</html>
