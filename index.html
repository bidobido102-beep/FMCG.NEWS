<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egypt Market Intelligence</title>

<style>
body { font-family: Arial; background:#0d1117; color:#fff; margin:0 }
header { background:#161b22; padding:15px; display:flex; justify-content:space-between }
.container { padding:20px }
.card { background:#161b22; padding:15px; margin-bottom:10px; border-radius:10px }
button { padding:8px 12px; cursor:pointer }
a { color:#58a6ff; text-decoration:none }
</style>
</head>

<body>

<header>
<h2>📊 السوق المصري</h2>
<button onclick="toggleLang()">EN/AR</button>
</header>

<!-- 💰 سعر الذهب -->
<div style="padding:15px; background:#222">
<h3>💰 سعر الذهب الآن: <span id="goldPrice">...</span></h3>
<p id="goldTrend"></p>
</div>

<!-- 📰 الأخبار -->
<div class="container" id="news">جاري تحميل الأخبار...</div>

<script>

function toggleLang(){
const html = document.documentElement;
html.lang = html.lang === 'ar' ? 'en' : 'ar';
html.dir = html.dir === 'rtl' ? 'ltr' : 'rtl';
}

async function fetchGold(){
try{
const res = await fetch("https://fmcg-api-production-cccc.up.railway.app/api/gold");
const data = await res.json();

document.getElementById("goldPrice").innerText = data.price;

if(data.trend === "up"){
document.getElementById("goldTrend").innerText = "🔼 السعر طالع";
}
else if(data.trend === "down"){
document.getElementById("goldTrend").innerText = "🔽 السعر نازل";
}
else{
document.getElementById("goldTrend").innerText = "ثابت";
}
}catch(e){
document.getElementById("goldTrend").innerText = "فشل تحميل السعر";
}
}

async function fetchNews(){
try{
const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://www.skynewsarabia.com/web/rss"));
const text = await res.text();

const parser = new DOMParser();
const xml = parser.parseFromString(text, "text/xml");

const items = xml.querySelectorAll("item");

const container = document.getElementById("news");
container.innerHTML = "";

items.forEach((item, i) => {
if(i >= 10) return;

const title = item.querySelector("title")?.textContent;
const link = item.querySelector("link")?.textContent;

container.innerHTML += `
<div class="card">
<h3>${title}</h3>
<a href="${link}" target="_blank">اقرأ الخبر</a>
</div>`;
});

}catch(e){
document.getElementById("news").innerHTML = "فشل تحميل الأخبار";
}
}

fetchGold();
fetchNews();

</script>

</body>
</html>
