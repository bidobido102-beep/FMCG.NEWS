<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMCG Egypt</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0 }
header { background:#222; padding:15px; display:flex; justify-content:space-between }
.container { padding:20px }
.card { background:#1e1e1e; padding:15px; margin-bottom:10px; border-radius:10px }
button { padding:8px 12px; cursor:pointer }
</style>

</head>

<body>

<header>
<h2>📊 السوق المصري</h2>
<button onclick="toggleLang()">EN/AR</button>
</header>

<div class="container" id="news"></div>

<script>

function toggleLang(){
const html = document.documentElement;
html.lang = html.lang === 'ar' ? 'en' : 'ar';
html.dir = html.dir === 'rtl' ? 'ltr' : 'rtl';
}

async function loadData(){
const container = document.getElementById("news");

try{

// 🟡 أخبار
const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.skynewsarabia.com/web/rss");
const data = await res.json();

// 🟡 أسعار وهمية (مؤقت)
const gold = 7200;
const iron = 42000;
const cars = 1000000;

// عرض الأسعار
container.innerHTML = `
<div class="card">
<h3>💰 سعر الذهب عيار 21</h3>
<p>${gold} جنيه</p>
</div>

<div class="card">
<h3>🏗️ سعر الحديد</h3>
<p>${iron} جنيه</p>
</div>

<div class="card">
<h3>🚗 متوسط أسعار السيارات</h3>
<p>${cars} جنيه</p>
</div>

<h2>📰 الأخبار</h2>
`;

// عرض الأخبار
data.items.slice(0,10).forEach(n => {
container.innerHTML += `
<div class="card">
<h3>${n.title}</h3>
<a href="${n.link}" target="_blank">اقرأ</a>
</div>`;
});

}catch(e){
container.innerHTML = "<p>❌ فشل تحميل البيانات</p>";
}

}

loadData();

</script>

</body>
</html>
