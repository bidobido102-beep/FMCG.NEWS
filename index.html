<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>FMCG News Egypt</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  direction: rtl;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
}

.badge {
  background: red;
  color: white;
  padding: 2px 6px;
  font-size: 12px;
  border-radius: 4px;
  margin-right: 5px;
}

a {
  color: #1e40af;
  text-decoration: none;
}

small {
  color: #555;
}
</style>
</head>

<body>

<h1>🛒 FMCG News Egypt</h1>

<!-- ===== أسعار ===== -->
<div class="card">
  <h2>📊 أسعار السلع اليوم</h2>

  <p><strong>🥇 الذهب</strong></p>
  <ul id="gold"></ul>

  <p><strong>🏗️ الحديد</strong></p>
  <p id="steel"></p>

  <p><strong>🧱 الأسمنت</strong></p>
  <p id="cement"></p>

  <small id="priceDate"></small>
</div>

<!-- ===== حالة التحميل ===== -->
<p id="status">⏳ جاري تحميل الأخبار...</p>

<!-- ===== الأخبار ===== -->
<div id="news"></div>

<script>
const API =
  "https://fmcg-api-production-5e80.up.railway.app/api/data";

fetch(API)
  .then(res => res.json())
  .then(data => {

    /* ===== الأسعار ===== */
    let goldHTML = "";
    for (let k in data.prices.gold) {
      goldHTML += `<li>${k}: ${data.prices.gold[k]}</li>`;
    }
    document.getElementById("gold").innerHTML = goldHTML;
    document.getElementById("steel").innerText = data.prices.steel;
    document.getElementById("cement").innerText = data.prices.cement;
    document.getElementById("priceDate").innerText =
      "آخر تحديث: " + data.prices.lastUpdate;

    /* ===== الأخبار ===== */
    document.getElementById("status").innerText =
      "✅ تم تحميل الأخبار";

    let html = "";
    data.news.forEach(n => {
      html += `
        <div class="card">
          <a href="${n.link}" target="_blank${n.priceIncrease ? '<span class="badge">زيادة أسعار</span>' : ''}
          <br>
          <small>${n.source}</small>
        </div>
      `;
    });
    document.getElementById("news").innerHTML = html;
  })
  .catch(err => {
    console.error(err);
    document.getElementById("status").innerText =
      "❌ فشل تحميل الأخبار";
  });
</script>

</body>
</html>
