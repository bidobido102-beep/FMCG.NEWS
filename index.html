<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>FMCG News Egypt</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }
    h2 { margin-top: 0; }
  </style>
</head>
<body>

<h1>🛒 FMCG News & Prices - Egypt</h1>

<div class="card" id="prices"></div>
<div class="card" id="news"></div>

<script>
fetch("data.json")
  .then(res => res.json())
  .then(data => {
    document.getElementById("prices").innerHTML = `
      <h2>📊 الأسعار</h2>
      <p>🥇 الذهب: ${data.prices.gold}</p>
      <p>🏗️ الحديد: ${data.prices.steel}</p>
      <p>🧱 الأسمنت: ${data.prices.cement}</p>
      <small>آخر تحديث: ${data.lastUpdate}</small>
    `;

    let newsHTML = "<h2>📰 أخبار FMCG</h2>";
    data.news.forEach(n => {
      newsHTML += `<p>• ${n.title} (${n.source})</p>`;
    });
    document.getElementById("news").innerHTML = newsHTML;
  });
</script>

</body>
</html>
