<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Market Dashboard</title>

<style>
body { background:#0d1117; color:#fff; font-family:Arial; margin:0 }
header { background:#161b22; padding:15px }
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:10px }
.card { background:#161b22; padding:15px; border-radius:10px }
h3 { margin:0 0 10px }
.big { font-size:24px }
</style>
</head>

<body>

<header>
<h2>📊 Market Dashboard</h2>
</header>

<div class="grid" id="data"></div>

<script>

async function load(){
const res = await fetch("https://fmcg-api-production-cccc.up.railway.app/api/dashboard");
const json = await res.json();

const d = json.data;

document.getElementById("data").innerHTML = `
<div class="card">
<h3>💰 ذهب 21</h3>
<div class="big">${d.gold["21"]} جنيه</div>
</div>

<div class="card">
<h3>🏗️ حديد</h3>
<div class="big">${d.iron}</div>
</div>

<div class="card">
<h3>🚗 سيارات</h3>
<div class="big">${d.cars}</div>
</div>

<div class="card">
<h3>🛒 FMCG</h3>
<div class="big">${d.fmcg}</div>
</div>
`;
}

load();
</script>

</body>
</html>
