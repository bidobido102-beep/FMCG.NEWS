<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>FMCG News Digest</title>

<style>
body { font-family: Arial; background:#f4f6f8; direction:rtl; padding:20px }
.card { background:#fff; padding:15px; margin-bottom:12px; border-radius:8px }
.badge { background:#e53935; color:#fff; padding:2px 6px; font-size:12px }
.company { color:#1e40af; font-weight: bold }
small { color:#666 }
</style>
</head>
<body>

<h1>📰 FMCG News Digest</h1>
<p id="time"></p>

<div id="feed">جاري التحميل...</div>

<script>
fetch("https://fmcg-api-production-5e80.up.railway.app/api/data")
.then(r => r.json())
.then(data => {
  document.getElementById("time").innerText =
    "آخر تحديث: " + data.updated;

  let html = "";
  data.news.forEach(n => {
    html += `
      <div class="card">
        <div>${n.title}</div>
        <p>${n.summary}</p>

        ${n.company ? `<div class="company">🏢 ${n.company}</div>` : ""}

        ${n.priceImpact ? `<span class="badge">تأثير سعري</span>` : ""}
        <br>
        <small>📌 المصدر: ${n.source}</small>
        <br>
        <a href="${n.link}" target    </div>
    `;
  });
  document.getElementById("feed").innerHTML = html;
});
</script>

</body>
</html>
