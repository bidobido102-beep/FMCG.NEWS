<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMCG News Egypt</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0 }
header { background:#222; padding:15px; display:flex; justify-content:space-between }
.container { padding:20px }
.card { background:#1e1e1e; padding:15px; margin-bottom:10px; border-radius:10px }
button { padding:8px 12px; cursor:pointer }
a { color: #4da6ff; text-decoration: none }
</style>

</head>

<body>

<header>
<h2>اخبار السلع الاستهلاكية</h2>
<button onclick="toggleLang()">EN/AR</button>
</header>

<div class="container" id="news">جاري تحميل الأخبار...</div>

<script>

function toggleLang(){
const html = document.documentElement;
html.lang = html.lang === 'ar' ? 'en' : 'ar';
html.dir = html.dir === 'rtl' ? 'ltr' : 'rtl';
}

async function fetchNews(){
try{

const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.aljazeera.net/aljazeera/rss");
const data = await res.json();

const container = document.getElementById("news");

if(!data.items){
container.innerHTML = "فشل تحميل الأخبار";
return;
}

container.innerHTML = "";

data.items.slice(0, 10).forEach(n => {
container.innerHTML += `
<div class="card">
<h3>${n.title}</h3>
<p>${n.author || "مصدر الخبر"}</p>
<a href="${n.link}" target="_blank">اقرأ الخبر</a>
</div>`;
});

}catch(e){
document.getElementById("news").innerHTML = "حصل خطأ في تحميل الأخبار";
console.log(e);
}
}

fetchNews();

</script>

</body>
</html>
