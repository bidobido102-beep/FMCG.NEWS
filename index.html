<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FMCG – السوق المصري</title>

  <!-- ✅ ربط ملف الأسعار -->
  <script src="data.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
    }

    header {
      background: #222;
      padding: 15px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e1e1e;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    h3 {
      margin-top: 0;
    }

    .price {
      font-weight: bold;
      font-size: 18px;
      margin: 5px 0;
    }

    small {
      color: #aaa;
      display: block;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>
  <h2>📊 FMCG – السوق المصري</h2>
</header>

<div class="container">

  <!-- ===== أسعار الذهب ===== -->
  <div class="card">
    <h3>🥇 أسعار الذهب</h3>
    <p class="price">عيار 24: <span id="g24"></span></p>
    <p class="price">عيار 21: <span id="g21"></span></p>
    <p class="price">عيار 18: <span id="g18"></span></p>
    <p class="price">جنيه ذهب: <span id="gp"></span></p>
    <small id="goldSource"></small>
  </div>

  <!-- ===== أسعار الحديد ===== -->
  <div class="card">
    <h3>🏗️ أسعار الحديد</h3>
    <p class="price" id="steel"></p>
    <small id="steelSource"></small>
  </div>

  <!-- ===== أسعار الأسمنت ===== -->
  <div class="card">
    <h3>🧱 أسعار الأسمنت</h3>
    <p class="price" id="cement"></p>
    <small id="cementSource"></small>
  </div>

  <!-- ===== شركات FMCG ===== -->
  <div class="card">
    <h3>🏢 شركات السلع الاستهلاكية</h3>
    <p class="price">كوكاكولا: <span id="coca"></span></p>
    <p class="price">بيبسي: <span id="pepsi"></span></p>
    <p class="price">إيديتا: <span id="edita"></span></p>
    <small>المصدر: Enterprise / البيانات الصحفية</small>
  </div>

  <!-- ===== أسعار السجائر ===== -->
  <div class="card">
    <h3>🚬 أسعار السجائر</h3>
    <p class="price">كليوباترا: <span id="cleo"></span></p>
    <p class="price">مارلبورو: <span id="marl"></span></p>
    <small id="cigSource"></small>
  </div>

  <!-- ===== تاريخ التحديث ===== -->
  <div class="card">
    <small id="date"></small>
  </div>

</div>
