<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>FMCG News Digest</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  direction: rtl;
  padding: 20px;
}
.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
}
.company {
  font-weight: bold;
  color: #1e40af;
}
.badge {
  background: #d32f2f;
  color: white;
  padding: 2px 6px;
  font-size: 12px;
  border-radius: 4px;
}
small {
  color: #666;
}
a {
  color: #1e40af;
  text-decoration: none;
}
</style>
</head>

<body>

<h1>📰 FMCG News Digest</h1>
<p id="time"></p>

<div id="feed">⏳ جاري التحميل...</div>

<script>
const API = "https://fmcg-api-production-5e80.up.railway.app/api/data";

fetch(API)
  .then(r => r.json())
  .then(data => {

    document.getElementById("time").innerText =
      "آخر تحديث: " + data.updated;

    let html = "";

    data.news.forEach(n => {
      html += `
        <div class="card">
          <strong>${n.title}</strong>
          <p>${n.summary}</p>

          ${n.company ? `<div class="company">🏢 ${n.company}</div>` : ""}

          ${n.priceImpact ? `<span class="badge">تأثير سعري</span>` : ""}
          <br><br>
          <small>📌 المصدر: ${n.source}</small><br>
          ${n.link}اقرأ الخبر</a>
        </div>
      `;
    });

    document.getElementById("feed").innerHTML = html;
  })
  .catch(() => {
    document.getElementById("feed").innerText =
      "❌ خطأ في تحميل الأخبار";
  });
</script>

</body>
</html>
