<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMCG News Egypt</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0 }
header { background:#222; padding:15px; display:flex; justify-content:space-between }
.container { padding:20px }
.card { background:#1e1e1e; padding:15px; margin-bottom:10px; border-radius:10px }
button { padding:8px 12px; cursor:pointer }
</style>

</head>

<body>

<header>
<h2>اخبار السلع الاستهلاكية</h2>
<button onclick="toggleLang()">EN/AR</button>
</header>

<div class="container" id="news"></div>

<script>
const API_BASE = "https://fmcg-api.onrender.com/api"; // هنغيره بعد شوية

function toggleLang(){
const html = document.documentElement;
html.lang = html.lang === 'ar' ? 'en' : 'ar';
html.dir = html.dir === 'rtl' ? 'ltr' : 'rtl';
}

async function fetchNews(){
try{
const res = await fetch(API_BASE + "/news");
const data = await res.json();

const container = document.getElementById("news");
container.innerHTML = "";

data.forEach(n => {
container.innerHTML += `
<div class="card">
<h3>${n.title}</h3>
<p>${n.source}</p>
<a href="${n.link}" target="_blank">اقرأ الخبر</a>
</div>`;
});

}catch(e){
console.log(e);
}
}

fetchNews();
</script>

</body>
</html>
